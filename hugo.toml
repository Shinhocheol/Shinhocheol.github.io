baseURL = "https://shinhocheol.github.io/"
languageCode = "ko-kr"
defaultContentLanguage = "ko"
title = "shingoon-lab"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
hasCJKLanguage = true

pagination.pagerSize = 10
summaryLength = 40

[minify]
  disableXML = true
  minifyOutput = true

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[params]
  env = "production"
  title = "shingoon-lab"
  description = "Open Infrastructure 기술 블로그 — OpenStack, Ceph, Kubernetes, Observability"
  keywords = ["OpenStack", "Ceph", "Kubernetes", "Cloud Native", "Observability", "MLOps"]
  author = "신호철 (shingoon)"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  mainSections = ["posts"]

  [params.homeInfoParams]
    Title = "shingoon-lab \U0001F44B"
    Content = """
Open Infrastructure 기술 블로그.

OpenStack · Ceph · Kubernetes · Observability · MLOps 를 주제로 1차 출처 기반의 팩트만 기록합니다.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Shinhocheol"

  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.assets]
    disableHLJS = true
    favicon = "/favicon.ico"

  [params.label]
    text = "shingoon-lab"

  [params.profileMode]
    enabled = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "series"
  name = "Series"
  url = "/series/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 50

[[menu.main]]
  identifier = "archive"
  name = "Archive"
  url = "/archives/"
  weight = 60

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github-dark"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2
